<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الإشعارات - CarBid</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #1a1a2e;
            color: white;
            padding: 20px 0;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }
        
        .sidebar-header {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        .sidebar-header h2 { color: #e63946; font-size: 24px; }
        
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0 15px;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #ccc;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: #e63946;
            color: white;
            transform: translateX(-5px);
        }
        
        .sidebar-footer {
            margin-top: auto;
            padding: 20px 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #ff6b6b;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
        }
        
        .main-content {
            margin-right: 260px;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 30px auto 50px;
            padding: 20px;
        }
        
        .navbar { display: none; }
        
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .filter-btn {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .filter-btn:hover {
            background: #e9ecef;
        }
        
        .filter-btn.active {
            background: #e63946;
            color: white;
            border-color: #e63946;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
        }
        
        h2 {
            color: #e63946;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
        }
        
        .mark-all {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .mark-all:hover {
            background: #1a252f;
        }
        
        .notifications-list {
            max-height: 550px;
            overflow-y: auto;
        }
        
        .notification-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .notification-item:hover {
            background: #f8f9fa;
        }
        
        .notification-item.unread {
            background: #fff5f5;
            border-right: 4px solid #e63946;
        }
        
        .notification-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
        
        .notification-icon.auction-end { background: #ffeaa7; color: #e63946; }
        .notification-icon.auction-win { background: #d4edda; color: #28a745; }
        .notification-icon.message { background: #cce5ff; color: #007bff; }
        .notification-icon.new-car { background: #d1ecf1; color: #17a2b8; }
        .notification-icon.bid { background: #fff3cd; color: #ffc107; }
        .notification-icon.outbid { background: #fce4d6; color: #c65911; }
        
        .notification-content { flex: 1; }
        .notification-message { font-weight: 500; margin-bottom: 5px; }
        .notification-time { font-size: 12px; color: #999; }
        
        .empty-msg {
            text-align: center;
            padding: 50px;
            color: #999;
        }
        
        .empty-msg i {
            font-size: 60px;
            color: #ddd;
            margin-bottom: 15px;
            display: block;
        }
        
        .badge-new {
            background: #e63946;
            color: white;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            margin-right: 8px;
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px 0; }
            .sidebar-header h2, .sidebar-nav a span, .logout-btn span { display: none; }
            .sidebar-nav a { justify-content: center; padding: 12px; }
            .sidebar-nav a i { margin: 0; font-size: 20px; }
            .main-content { margin-right: 70px; }
            .container { padding: 10px; margin-top: 20px; }
            .filter-buttons { justify-content: center; }
            .card-header { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2><i class="fas fa-gavel"></i> CarBid</h2></div>
        <div class="sidebar-nav">
            <a href="../index.html"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="categories.html"><i class="fas fa-gavel"></i> <span>المزادات</span></a>
            <a href="search.html"><i class="fas fa-search"></i> <span>البحث</span></a>
            <a href="favorites.html"><i class="fas fa-heart"></i> <span>المفضلة</span></a>
            <a href="my-bids.html"><i class="fas fa-money-bill"></i> <span>عروضي</span></a>
            <a href="wallet.html"><i class="fas fa-wallet"></i> <span>المحفظة</span></a>
            <a href="notifications.html" class="active"><i class="fas fa-bell"></i> <span>الإشعارات</span></a>
            <a href="messages.html"><i class="fas fa-envelope"></i> <span>الرسائل</span></a>
            <a href="profile.html"><i class="fas fa-user"></i> <span>حسابي</span></a>
        </div>
        <div class="sidebar-footer">
            <div class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>تسجيل خروج</span></div>
        </div>
    </div>

    <div class="main-content">
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-bell"></i> الإشعارات</h2>
                    <button class="mark-all" onclick="markAllAsRead()"><i class="fas fa-check-double"></i> تعيين الكل كمقروء</button>
                </div>
                
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterNotifications('all', this)">📋 الكل</button>
                    <button class="filter-btn" onclick="filterNotifications('unread', this)">🔴 غير مقروءة</button>
                    <button class="filter-btn" onclick="filterNotifications('auction', this)">⏰ المزادات</button>
                    <button class="filter-btn" onclick="filterNotifications('win', this)">🏆 فوز</button>
                    <button class="filter-btn" onclick="filterNotifications('message', this)">💬 الرسائل</button>
                    <button class="filter-btn" onclick="filterNotifications('car', this)">🚗 السيارات</button>
                </div>
                
                <div id="notificationsList" class="notifications-list"></div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let notificationCheckInterval = null;

        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('currentUser'));
        }
        
        // ========== إضافة إشعارات تجريبية ==========
        function addSampleNotifications() {
            const currentUser = getCurrentUser();
            if (!currentUser) return;
            
            let notifications = JSON.parse(localStorage.getItem('notifications')) || [];
            
            // التحقق إذا كان المستخدم لديه إشعارات بالفعل
            const userNotifications = notifications.filter(n => n.userId === currentUser.id);
            if (userNotifications.length > 0) return;
            
            const now = new Date();
            const sampleNotifications = [
                {
                    id: Date.now() + 1,
                    userId: currentUser.id,
                    message: "🏆 تهانينا! لقد فزت بسيارة تويوتا كامري 2023 بمبلغ 92,000 ر.س",
                    type: "auction_win",
                    read: false,
                    createdAt: new Date(now.getTime() - 1 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 2,
                    userId: currentUser.id,
                    message: "💰 تم تجاوز عرضك في مزاد مرسيدس الفئة E 2024. العرض الحالي: 225,000 ر.س",
                    type: "outbid",
                    read: false,
                    createdAt: new Date(now.getTime() - 3 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 3,
                    userId: currentUser.id,
                    message: "💬 رسالة جديدة من أحمد السبيعي: مرحباً، هل السيارة لا تزال متاحة؟",
                    type: "message",
                    read: false,
                    createdAt: new Date(now.getTime() - 5 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 4,
                    userId: currentUser.id,
                    message: "🚗 تم إضافة سيارة جديدة: BMW X5 2024 - سعر البداية 195,000 ر.س",
                    type: "new_car",
                    read: false,
                    createdAt: new Date(now.getTime() - 1 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 5,
                    userId: currentUser.id,
                    message: "⏰ تنبيه: مزاد نيسان باترول 2024 ينتهي خلال ساعة!",
                    type: "auction_end",
                    read: true,
                    createdAt: new Date(now.getTime() - 2 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 6,
                    userId: currentUser.id,
                    message: "💰 عرض جديد على سيارتك هيونداي النترا 2023 بقيمة 62,000 ر.س من محمد القحطاني",
                    type: "bid",
                    read: true,
                    createdAt: new Date(now.getTime() - 3 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 7,
                    userId: currentUser.id,
                    message: "💬 رسالة جديدة من نورة العتيبي: هل تقبلين التفاوض على السعر؟",
                    type: "message",
                    read: true,
                    createdAt: new Date(now.getTime() - 4 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 8,
                    userId: currentUser.id,
                    message: "🏆 تهانينا! لقد فزت بسيارة هيونداي النترا 2023 بمبلغ 58,000 ر.س",
                    type: "auction_win",
                    read: true,
                    createdAt: new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 9,
                    userId: currentUser.id,
                    message: "🚗 تم إضافة سيارة جديدة: أودي A6 2024 - سعر البداية 210,000 ر.س",
                    type: "new_car",
                    read: true,
                    createdAt: new Date(now.getTime() - 10 * 24 * 60 * 60 * 1000).toISOString()
                },
                {
                    id: Date.now() + 10,
                    userId: currentUser.id,
                    message: "💰 تم شحن رصيدك بمبلغ 5,000 ر.س بنجاح",
                    type: "deposit",
                    read: true,
                    createdAt: new Date(now.getTime() - 15 * 24 * 60 * 60 * 1000).toISOString()
                }
            ];
            
            notifications.push(...sampleNotifications);
            localStorage.setItem('notifications', JSON.stringify(notifications));
        }
        
        // ========== تحميل الإشعارات ==========
        function loadNotifications() {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                window.location.href = '../login.html';
                return;
            }
            
            let notifications = JSON.parse(localStorage.getItem('notifications')) || [];
            let myNotifications = notifications.filter(n => n.userId === currentUser.id);
            
            // تطبيق الفلتر
            if (currentFilter === 'unread') {
                myNotifications = myNotifications.filter(n => !n.read);
            } else if (currentFilter === 'auction') {
                myNotifications = myNotifications.filter(n => n.type === 'auction_end' || n.type === 'auction_start');
            } else if (currentFilter === 'win') {
                myNotifications = myNotifications.filter(n => n.type === 'auction_win');
            } else if (currentFilter === 'message') {
                myNotifications = myNotifications.filter(n => n.type === 'message');
            } else if (currentFilter === 'car') {
                myNotifications = myNotifications.filter(n => n.type === 'new_car');
            }
            
            myNotifications.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            const container = document.getElementById('notificationsList');
            
            if (myNotifications.length === 0) {
                let emptyMessage = 'لا توجد إشعارات';
                if (currentFilter === 'unread') emptyMessage = '✨ لا توجد إشعارات غير مقروءة';
                else if (currentFilter === 'auction') emptyMessage = '⏰ لا توجد إشعارات عن المزادات';
                else if (currentFilter === 'win') emptyMessage = '🏆 لا توجد إشعارات فوز';
                else if (currentFilter === 'message') emptyMessage = '💬 لا توجد رسائل جديدة';
                else if (currentFilter === 'car') emptyMessage = '🚗 لا توجد إشعارات عن السيارات';
                
                container.innerHTML = `<div class="empty-msg"><i class="fas fa-bell-slash"></i><p>${emptyMessage}</p></div>`;
                return;
            }
            
            const unreadCount = myNotifications.filter(n => !n.read).length;
            if (unreadCount > 0) {
                document.title = `(${unreadCount}) الإشعارات - CarBid`;
            } else {
                document.title = 'الإشعارات - CarBid';
            }
            
            container.innerHTML = myNotifications.map(n => {
                const iconClass = getNotificationIconClass(n);
                const iconSymbol = getNotificationIconSymbol(n);
                const isUnread = !n.read;
                
                return `
                    <div class="notification-item ${isUnread ? 'unread' : ''}" onclick="markAsRead(${n.id})">
                        <div class="notification-icon ${iconClass}">
                            <i class="fas ${iconSymbol}"></i>
                        </div>
                        <div class="notification-content">
                            <div class="notification-message">
                                ${n.message}
                                ${isUnread ? '<span class="badge-new">جديد</span>' : ''}
                            </div>
                            <div class="notification-time">${getTimeAgo(n.createdAt)}</div>
                        </div>
                        ${isUnread ? '<div style="width: 8px; height: 8px; background: #e63946; border-radius: 50%;"></div>' : ''}
                    </div>
                `;
            }).join('');
        }
        
        function getNotificationIconClass(notification) {
            const type = notification.type;
            if (type === 'auction_end') return 'auction-end';
            if (type === 'auction_win') return 'auction-win';
            if (type === 'message') return 'message';
            if (type === 'new_car') return 'new-car';
            if (type === 'outbid') return 'outbid';
            if (type === 'bid') return 'bid';
            return 'bid';
        }
        
        function getNotificationIconSymbol(notification) {
            const type = notification.type;
            if (type === 'auction_end') return 'fa-clock';
            if (type === 'auction_win') return 'fa-trophy';
            if (type === 'message') return 'fa-envelope';
            if (type === 'new_car') return 'fa-car';
            if (type === 'outbid') return 'fa-frown';
            if (type === 'bid') return 'fa-gavel';
            if (type === 'deposit') return 'fa-wallet';
            return 'fa-bell';
        }
        
        function getTimeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'الآن';
            if (diffMins < 60) return `منذ ${diffMins} دقيقة`;
            if (diffHours < 24) return `منذ ${diffHours} ساعة`;
            if (diffDays < 7) return `منذ ${diffDays} يوم`;
            if (diffDays < 30) return `منذ ${Math.floor(diffDays / 7)} أسبوع`;
            return new Date(dateString).toLocaleDateString('ar');
        }
        
        function markAsRead(notificationId) {
            let notifications = JSON.parse(localStorage.getItem('notifications')) || [];
            const index = notifications.findIndex(n => n.id === notificationId);
            if (index !== -1 && !notifications[index].read) {
                notifications[index].read = true;
                localStorage.setItem('notifications', JSON.stringify(notifications));
                loadNotifications();
            }
        }
        
        function markAllAsRead() {
            const currentUser = getCurrentUser();
            if (!currentUser) return;
            
            let notifications = JSON.parse(localStorage.getItem('notifications')) || [];
            let updated = false;
            notifications = notifications.map(n => {
                if (n.userId === currentUser.id && !n.read) {
                    n.read = true;
                    updated = true;
                }
                return n;
            });
            if (updated) {
                localStorage.setItem('notifications', JSON.stringify(notifications));
                loadNotifications();
            }
        }
        
        function filterNotifications(filter, element) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            loadNotifications();
        }
        
        // ========== دوال مساعدة لإضافة إشعارات من صفحات أخرى ==========
        function addNotification(userId, message, type = 'general') {
            const notifications = JSON.parse(localStorage.getItem('notifications')) || [];
            notifications.unshift({
                id: Date.now(),
                userId: userId,
                message: message,
                type: type,
                read: false,
                createdAt: new Date().toISOString()
            });
            localStorage.setItem('notifications', JSON.stringify(notifications));
            
            // تحديث الإشعارات إذا كانت الصفحة مفتوحة
            if (getCurrentUser() && getCurrentUser().id === userId) {
                loadNotifications();
            }
        }
        
        function notifyAuctionEnd(userId, carName, winnerName, amount) {
            addNotification(userId, `⏰ انتهى مزاد ${carName} - الفائز: ${winnerName} بمبلغ ${amount.toLocaleString()} ر.س`, 'auction_end');
        }
        
        function notifyAuctionWin(userId, carName, amount) {
            addNotification(userId, `🏆 تهانينا! لقد فزت بسيارة ${carName} بمبلغ ${amount.toLocaleString()} ر.س`, 'auction_win');
        }
        
        function notifyNewMessage(userId, fromUserName) {
            addNotification(userId, `💬 رسالة جديدة من ${fromUserName}`, 'message');
        }
        
        function notifyNewCar(userId, carName) {
            addNotification(userId, `🚗 تم إضافة سيارة جديدة: ${carName}`, 'new_car');
        }
        
        function notifyNewBid(sellerId, carName, bidAmount, bidderName) {
            addNotification(sellerId, `💰 عرض جديد على ${carName}: ${bidAmount.toLocaleString()} ر.س من ${bidderName}`, 'bid');
        }
        
        function notifyOutbid(userId, carName, newAmount) {
            addNotification(userId, `📉 تم تجاوز عرضك في مزاد ${carName}. العرض الحالي: ${newAmount.toLocaleString()} ر.س`, 'outbid');
        }
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }
        
        function init() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = '../login.html';
                return;
            }
            addSampleNotifications();
            loadNotifications();
            
            // تحديث كل 30 ثانية
            if (notificationCheckInterval) clearInterval(notificationCheckInterval);
            notificationCheckInterval = setInterval(() => {
                loadNotifications();
            }, 30000);
        }
        
        init();
        
        window.addNotification = addNotification;
        window.notifyAuctionEnd = notifyAuctionEnd;
        window.notifyAuctionWin = notifyAuctionWin;
        window.notifyNewMessage = notifyNewMessage;
        window.notifyNewCar = notifyNewCar;
        window.notifyNewBid = notifyNewBid;
        window.notifyOutbid = notifyOutbid;
    </script>
</body>
</html>
