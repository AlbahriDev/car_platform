<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - CarBid</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Cairo", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 10% 20%, #070b1f, #03040c);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية ديناميكية متقدمة */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .gradient-sphere {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.05));
            border-radius: 50%;
            top: -20%;
            left: -20%;
            filter: blur(70px);
            animation: floatSphere 22s infinite alternate ease-in-out;
        }

        .gradient-sphere.second {
            bottom: -30%;
            right: -20%;
            top: auto;
            left: auto;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.2), rgba(0, 200, 255, 0.05));
            animation: floatSphere 25s infinite alternate-reverse;
        }

        @keyframes floatSphere {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(8%, 8%) scale(1.2); opacity: 0.8; }
        }

        /* الجسيمات ثلاثية الأبعاد */
        .particle-field {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .glow-particle {
            position: absolute;
            background: rgba(0, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 15px cyan, 0 0 5px rgba(0,255,255,0.8);
            animation: particleFlow 10s infinite linear;
        }

        @keyframes particleFlow {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.9;
            }
            85% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100px) translateX(30px) rotate(720deg);
                opacity: 0;
            }
        }

        /* شريط التنقل الفاخر */
        .glass-nav {
            background: rgba(5, 8, 25, 0.65);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.35);
            padding: 0.9rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h2 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(125deg, cyan, #ff44cc, #00e0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            animation: textGlow 3s infinite;
        }

        @keyframes textGlow {
            0% { filter: drop-shadow(0 0 3px cyan); }
            50% { filter: drop-shadow(0 0 12px magenta); }
            100% { filter: drop-shadow(0 0 3px cyan); }
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #eef5ff;
            font-weight: 600;
            font-size: 1.05rem;
            transition: 0.25s;
            position: relative;
            padding: 0.3rem 0;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0%;
            height: 2.5px;
            background: linear-gradient(90deg, cyan, magenta);
            border-radius: 5px;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .nav-links a:hover::before, .nav-links a.active::before {
            width: 100%;
        }

        .nav-links a:hover, .nav-links a.active {
            color: cyan;
            text-shadow: 0 0 8px cyan;
        }

        /* حاوية الكارد - لون موحد متناغم مع الصفحة */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.5rem;
            min-height: 80vh;
        }

        .login-card {
            width: 100%;
            max-width: 560px;
            background: linear-gradient(145deg, rgba(8, 12, 28, 0.85), rgba(3, 5, 18, 0.9));
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 255, 0.15);
            padding: 2.8rem 2.2rem;
            transition: all 0.4s ease;
            animation: cardFloat 0.8s cubic-bezier(0.2, 0.9, 0.6, 1.1);
            position: relative;
            overflow: hidden;
        }

        @keyframes cardFloat {
            0% { opacity: 0; transform: translateY(60px) scale(0.96); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .login-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 255, 255, 0.8);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 45px rgba(0, 255, 255, 0.3);
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, rgba(0, 255, 255, 0.4), rgba(255, 0, 255, 0.3), rgba(0, 255, 255, 0.4));
            border-radius: 2.5rem;
            z-index: -1;
            opacity: 0;
            filter: blur(18px);
            transition: opacity 0.5s;
        }

        .login-card:hover::after {
            opacity: 0.45;
            animation: borderSpin 4s linear infinite;
        }

        @keyframes borderSpin {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        h2 {
            text-align: center;
            font-size: 2.1rem;
            font-weight: 800;
            background: linear-gradient(125deg, #ffffff, #88ddff, #ff99dd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .input-field {
            position: relative;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 1.2rem;
            border: 1px solid rgba(0, 255, 255, 0.35);
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .input-field:focus-within {
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4), inset 0 0 6px rgba(0,255,255,0.2);
            background: rgba(0, 0, 0, 0.75);
            transform: scale(1.01);
        }

        .input-field i {
            width: 50px;
            text-align: center;
            font-size: 1.25rem;
            color: cyan;
            transition: all 0.2s;
        }

        .input-field:focus-within i {
            color: magenta;
            transform: rotateY(180deg);
            text-shadow: 0 0 5px magenta;
        }

        .input-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 1rem;
            font-size: 1rem;
            color: #f0f0ff;
            font-family: 'Cairo', sans-serif;
            outline: none;
            direction: rtl;
        }

        .input-field input::placeholder {
            color: rgba(0, 255, 255, 0.65);
            font-weight: 500;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(105deg, #0ff, #2a7fff, #f0f);
            background-size: 200% auto;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            color: #111;
            border-radius: 1.5rem;
            cursor: pointer;
            transition: 0.35s;
            margin-top: 0.8rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px cyan;
        }

        .btn-login:hover {
            background-position: right center;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0,255,255,0.7), 0 0 25px magenta;
            color: #000;
        }

        .btn-login:active {
            transform: translateY(2px);
        }

        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            transform: scale(0);
            animation: rippleAnim 0.55s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(12);
                opacity: 0;
            }
        }

        .saved-accounts {
            margin-top: 2rem;
            background: rgba(0, 15, 30, 0.6);
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid rgba(0, 255, 255, 0.25);
            backdrop-filter: blur(5px);
        }

        .saved-header {
            text-align: center;
            font-size: 0.85rem;
            color: #bbd9ff;
            margin-bottom: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .accounts-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .account-row {
            background: rgba(0, 255, 255, 0.08);
            border-radius: 14px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid cyan;
        }

        .account-row:hover {
            background: rgba(0, 255, 255, 0.2);
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,255,255,0.2);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: white;
        }

        .user-info i {
            color: cyan;
            font-size: 1rem;
        }

        .credentials {
            display: flex;
            gap: 15px;
            font-size: 0.8rem;
            font-family: monospace;
        }

        .cred-email {
            color: cyan;
            font-weight: 600;
        }

        .cred-pass {
            color: #ff77aa;
            direction: ltr;
        }

        .register-footer {
            text-align: center;
            margin-top: 1.6rem;
            font-size: 0.9rem;
            color: #ccddf8;
        }

        .register-footer a {
            color: cyan;
            text-decoration: none;
            font-weight: 700;
            margin-right: 5px;
            transition: 0.2s;
            position: relative;
        }

        .register-footer a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            right: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, cyan, magenta);
            transition: 0.25s;
        }

        .register-footer a:hover::after {
            width: 100%;
        }

        .register-footer a:hover {
            text-shadow: 0 0 5px cyan;
        }

        .neon-toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            z-index: 1100;
            animation: toastSlide 0.35s ease;
            border-right: 5px solid cyan;
            box-shadow: 0 0 25px rgba(0,255,255,0.4);
            direction: rtl;
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(-80px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastExit {
            to {
                opacity: 0;
                transform: translateX(-80px);
            }
        }

        @media (max-width: 650px) {
            .container {
                flex-direction: column;
                gap: 12px;
                padding: 0 1rem;
            }
            .nav-links {
                gap: 1.2rem;
            }
            .login-card {
                padding: 1.8rem;
            }
            .account-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .credentials {
                width: 100%;
                justify-content: space-between;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #03050c;
        }
        ::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="dynamic-bg">
        <div class="gradient-sphere"></div>
        <div class="gradient-sphere second"></div>
    </div>
    <div class="particle-field" id="particleField"></div>

    <nav class="glass-nav">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-gavel"></i> CarBid</h2>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="categories.html"><i class="fas fa-car"></i> المزادات</a>
                <a href="my-bids.html"><i class="fas fa-chart-line"></i> عروضي</a>
                <a href="wallet.html"><i class="fas fa-wallet"></i> المحفظة</a>
                <a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> دخول</a>
            </div>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="login-card">
            <h2>
                <i class="fas fa-fingerprint"></i> 
                مرحباً بعودتك
            </h2>
            <form id="loginForm">
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="emailInput" placeholder="البريد الإلكتروني" autocomplete="email" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-key"></i>
                    <input type="password" id="passwordInput" placeholder="كلمة المرور" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="loginSubmitBtn">
                    <i class="fas fa-arrow-right"></i> دخول إلى حسابي
                </button>
            </form>

            <div class="saved-accounts">
                <div class="saved-header">
                    <i class="fas fa-address-card"></i> حسابات تجريبية (نقر للتعبئة الفورية)
                    <i class="fas fa-magic"></i>
                </div>
                <div class="accounts-grid" id="accountsGrid"></div>
            </div>

            <div class="register-footer">
                ليس لديك حساب؟
                <a href="register.html">✨ إنشاء حساب جديد ✨</a>
            </div>
        </div>
    </div>

    <script>
        function attachRipple(btnElement) {
            if (!btnElement) return;
            btnElement.addEventListener('click', function(e) {
                if (btnElement.disabled) return;
                const rippleSpan = document.createElement('span');
                rippleSpan.classList.add('ripple-effect');
                const rect = btnElement.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const mouseX = e.clientX - rect.left - size/2;
                const mouseY = e.clientY - rect.top - size/2;
                rippleSpan.style.width = rippleSpan.style.height = size + 'px';
                rippleSpan.style.left = mouseX + 'px';
                rippleSpan.style.top = mouseY + 'px';
                rippleSpan.style.position = 'absolute';
                rippleSpan.style.overflow = 'hidden';
                btnElement.style.position = 'relative';
                btnElement.appendChild(rippleSpan);
                setTimeout(() => rippleSpan.remove(), 550);
            });
        }

        function showFancyToast(message, isError = false) {
            const oldToast = document.querySelector('.neon-toast');
            if (oldToast) oldToast.remove();
            const toast = document.createElement('div');
            toast.className = 'neon-toast';
            toast.style.borderRightColor = isError ? '#ff4d6d' : '#0ff';
            toast.style.background = isError ? 'rgba(40, 10, 20, 0.9)' : 'rgba(0, 30, 40, 0.9)';
            toast.innerHTML = `
                <i class="fas ${isError ? 'fa-times-circle' : 'fa-check-circle'}" style="color: ${isError ? '#ff6b8b' : '#0ff'}; font-size: 1.3rem;"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastExit 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3200);
        }

        // نظام المستخدمين - حفظ بنفس المفتاح المستخدم في باقي الصفحات (users)
        function getSystemUsers() {
            let storedUsers = localStorage.getItem('users');
            if (!storedUsers) {
                const defaultUsers = [
                    { id: 1, name: "أحمد محمد", email: "ahmed@example.com", password: "123456", walletBalance: 5000, role: "user", phone: "0500000000", city: "الرياض", transactions: [], createdAt: new Date().toISOString() },
                    { id: 2, name: "سارة أحمد", email: "sara@example.com", password: "123456", walletBalance: 10000, role: "user", phone: "0511111111", city: "جدة", transactions: [], createdAt: new Date().toISOString() },
                    { id: 999, name: "مدير النظام", email: "admin@carbid.com", password: "admin123", walletBalance: 0, role: "admin", phone: "0599999999", city: "الرياض", transactions: [], createdAt: new Date().toISOString() }
                ];
                localStorage.setItem('users', JSON.stringify(defaultUsers));
                return defaultUsers;
            }
            return JSON.parse(storedUsers);
        }

        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        function renderAccountsList() {
            const users = getSystemUsers();
            const container = document.getElementById('accountsGrid');
            if (!container) return;
            container.innerHTML = users.map(user => `
                <div class="account-row" onclick="autoFillCredentials('${user.email}', '${user.password}')">
                    <div class="user-info">
                        <i class="fas ${user.role === 'admin' ? 'fa-crown' : 'fa-user-astronaut'}"></i>
                        <span><strong>${user.name}</strong> ${user.role === 'admin' ? '(مدير)' : ''}</span>
                    </div>
                    <div class="credentials">
                        <span class="cred-email"><i class="far fa-envelope"></i> ${user.email}</span>
                        <span class="cred-pass"><i class="fas fa-lock"></i> ${user.password}</span>
                    </div>
                </div>
            `).join('');
        }

        window.autoFillCredentials = function(email, password) {
            document.getElementById('emailInput').value = email;
            document.getElementById('passwordInput').value = password;
            showFancyToast(`✅ تم تعبئة بيانات: ${email}`, false);
            const card = document.querySelector('.login-card');
            card.style.transform = 'scale(1.01)';
            setTimeout(() => card.style.transform = '', 200);
        }

        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('loginSubmitBtn');

        if (loginForm) {
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passwordInput').value;

                if (!email || !password) {
                    showFancyToast("⚠️ الرجاء إدخال البريد وكلمة المرور", true);
                    return;
                }

                submitBtn.disabled = true;
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري التحقق من الهوية...';

                setTimeout(() => {
                    const users = getSystemUsers();
                    const foundUser = users.find(u => u.email === email && u.password === password);

                    if (foundUser) {
                        // حفظ المستخدم بنفس المفتاح الذي تستخدمه باقي الصفحات (currentUser)
                        const sessionUser = {
                            id: foundUser.id,
                            name: foundUser.name,
                            email: foundUser.email,
                            walletBalance: foundUser.walletBalance,
                            transactions: foundUser.transactions || [],
                            role: foundUser.role,
                            phone: foundUser.phone || "",
                            city: foundUser.city || "",
                            loginAt: new Date().toISOString()
                        };
                        localStorage.setItem('currentUser', JSON.stringify(sessionUser));
                        
                        showFancyToast(`🎉 أهلاً ${foundUser.name}! جاري توجيهك ...`, false);
                        setTimeout(() => {
                            const redirect = foundUser.role === 'admin' ? 'pages/admin-dashboard.html' : 'index.html';
                            window.location.href = redirect;
                        }, 1300);
                    } else {
                        showFancyToast("❌ البريد الإلكتروني أو كلمة المرور غير صحيحة", true);
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalText;
                    }
                }, 750);
            });
        }

        function initParticleField() {
            const field = document.getElementById('particleField');
            const particleCount = 85;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('glow-particle');
                const size = Math.random() * 4 + 1.5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = Math.random() * 14 + 7 + 's';
                particle.style.opacity = Math.random() * 0.7 + 0.2;
                particle.style.backgroundColor = Math.random() > 0.6 ? '#0ff' : '#ff44cc';
                particle.style.boxShadow = `0 0 ${Math.random() * 12 + 3}px ${Math.random() > 0.5 ? 'cyan' : 'magenta'}`;
                field.appendChild(particle);
            }
        }

        const allBtns = document.querySelectorAll('.btn-login');
        allBtns.forEach(btn => attachRipple(btn));
        
        renderAccountsList();
        initParticleField();

        const inputs = document.querySelectorAll('.input-field input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.style.transform = 'scale(1.01)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.transform = '';
            });
        });

        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.login-card');
            if (!card) return;
            const { clientX, clientY } = e;
            const xAxis = (window.innerWidth / 2 - clientX) / 45;
            const yAxis = (window.innerHeight / 2 - clientY) / 45;
            card.style.transform = `perspective(1000px) rotateY(${xAxis * 0.25}deg) rotateX(${yAxis * -0.2}deg) translateY(-3px)`;
            setTimeout(() => {
                if (!card.matches(':hover')) {
                    card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) translateY(0px)';
                }
            }, 120);
        });
    </script>
</body>
</html>
