<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title> انشاء حساب </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Cairo", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 10% 20%, #070b1f, #03040c);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية ديناميكية متطابقة مع صفحة تسجيل الدخول */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .gradient-sphere {
            position: absolute;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.05));
            border-radius: 50%;
            top: -20%;
            left: -20%;
            filter: blur(70px);
            animation: floatSphere 22s infinite alternate ease-in-out;
        }

        .gradient-sphere.second {
            bottom: -30%;
            right: -20%;
            top: auto;
            left: auto;
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.2), rgba(0, 200, 255, 0.05));
            animation: floatSphere 25s infinite alternate-reverse;
        }

        @keyframes floatSphere {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(8%, 8%) scale(1.2); opacity: 0.8; }
        }

        /* الجسيمات المتحركة */
        .particle-field {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .glow-particle {
            position: absolute;
            background: rgba(0, 255, 255, 0.7);
            border-radius: 50%;
            box-shadow: 0 0 15px cyan, 0 0 5px rgba(0,255,255,0.8);
            animation: particleFlow 10s infinite linear;
        }

        @keyframes particleFlow {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.9;
            }
            85% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-100px) translateX(30px) rotate(720deg);
                opacity: 0;
            }
        }

        /* شريط التنقل المطابق */
        .glass-nav {
            background: rgba(5, 8, 25, 0.65);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.35);
            padding: 0.9rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo h2 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(125deg, cyan, #ff44cc, #00e0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            animation: textGlow 3s infinite;
        }

        @keyframes textGlow {
            0% { filter: drop-shadow(0 0 3px cyan); }
            50% { filter: drop-shadow(0 0 12px magenta); }
            100% { filter: drop-shadow(0 0 3px cyan); }
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #eef5ff;
            font-weight: 600;
            font-size: 1.05rem;
            transition: 0.25s;
            position: relative;
            padding: 0.3rem 0;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0%;
            height: 2.5px;
            background: linear-gradient(90deg, cyan, magenta);
            border-radius: 5px;
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .nav-links a:hover::before, .nav-links a.active::before {
            width: 100%;
        }

        .nav-links a:hover, .nav-links a.active {
            color: cyan;
            text-shadow: 0 0 8px cyan;
        }

        /* الحاوية الرئيسية */
        .register-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.5rem;
            min-height: 80vh;
        }

        /* بطاقة التسجيل - لون موحد متناغم مع الصفحة */
        .register-card {
            width: 100%;
            max-width: 560px;
            background: linear-gradient(145deg, rgba(8, 12, 28, 0.85), rgba(3, 5, 18, 0.9));
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 255, 0.15);
            padding: 2.8rem 2.2rem;
            transition: all 0.4s ease;
            animation: cardFloat 0.8s cubic-bezier(0.2, 0.9, 0.6, 1.1);
            position: relative;
            overflow: hidden;
        }

        @keyframes cardFloat {
            0% { opacity: 0; transform: translateY(60px) scale(0.96); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .register-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 255, 255, 0.8);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), 0 0 45px rgba(0, 255, 255, 0.3);
        }

        .register-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, rgba(0, 255, 255, 0.4), rgba(255, 0, 255, 0.3), rgba(0, 255, 255, 0.4));
            border-radius: 2.5rem;
            z-index: -1;
            opacity: 0;
            filter: blur(18px);
            transition: opacity 0.5s;
        }

        .register-card:hover::after {
            opacity: 0.45;
            animation: borderSpin 4s linear infinite;
        }

        @keyframes borderSpin {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        h2 {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(125deg, #ffffff, #88ddff, #ff99dd);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* حقول الإدخال */
        .input-field {
            position: relative;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.55);
            border-radius: 1.2rem;
            border: 1px solid rgba(0, 255, 255, 0.35);
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }

        .input-field:focus-within {
            border-color: #0ff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4), inset 0 0 6px rgba(0,255,255,0.2);
            background: rgba(0, 0, 0, 0.75);
            transform: scale(1.01);
        }

        .input-field i {
            width: 50px;
            text-align: center;
            font-size: 1.2rem;
            color: cyan;
            transition: all 0.2s;
        }

        .input-field:focus-within i {
            color: magenta;
            transform: rotateY(180deg);
            text-shadow: 0 0 5px magenta;
        }

        .input-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 1rem;
            font-size: 1rem;
            color: #f0f0ff;
            font-family: 'Cairo', sans-serif;
            outline: none;
            direction: rtl;
        }

        .input-field input::placeholder {
            color: rgba(0, 255, 255, 0.65);
            font-weight: 500;
        }

        /* قوة كلمة المرور */
        .password-strength {
            margin-top: -0.2rem;
            margin-bottom: 1rem;
            height: 5px;
            border-radius: 8px;
            background: rgba(0, 255, 255, 0.15);
            overflow: hidden;
        }

        .strength-bar {
            width: 0%;
            height: 100%;
            transition: width 0.4s ease, background 0.3s;
            border-radius: 8px;
            box-shadow: 0 0 4px currentColor;
        }

        /* زر التسجيل */
        .btn-register {
            width: 100%;
            background: linear-gradient(105deg, #0ff, #2a7fff, #f0f);
            background-size: 200% auto;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            color: #111;
            border-radius: 1.5rem;
            cursor: pointer;
            transition: 0.35s;
            margin-top: 0.8rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px cyan;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-register:hover {
            background-position: right center;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(0,255,255,0.7), 0 0 25px magenta;
            color: #000;
        }

        .btn-register:active {
            transform: translateY(2px);
        }

        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            transform: scale(0);
            animation: rippleAnim 0.55s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(12);
                opacity: 0;
            }
        }

        /* روابط اضافية */
        .login-redirect {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.9rem;
            color: #ccddf8;
        }

        .login-redirect a {
            color: cyan;
            text-decoration: none;
            font-weight: 700;
            margin-right: 5px;
            transition: 0.2s;
            position: relative;
        }

        .login-redirect a::after {
            content: '';
            position: absolute;
            bottom: -3px;
            right: 0;
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, cyan, magenta);
            transition: 0.25s;
        }

        .login-redirect a:hover::after {
            width: 100%;
        }

        .login-redirect a:hover {
            text-shadow: 0 0 5px cyan;
        }

        .terms-note {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: rgba(0, 255, 255, 0.5);
        }

        .terms-note a {
            color: rgba(0, 255, 255, 0.8);
            text-decoration: none;
            transition: 0.2s;
        }

        .terms-note a:hover {
            color: cyan;
            text-shadow: 0 0 4px cyan;
        }

        /* توست notifications */
        .neon-toast {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            z-index: 1100;
            animation: toastSlide 0.35s ease;
            border-right: 5px solid cyan;
            box-shadow: 0 0 25px rgba(0,255,255,0.4);
            direction: rtl;
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(-80px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes toastExit {
            to {
                opacity: 0;
                transform: translateX(-80px);
            }
        }

        @media (max-width: 650px) {
            .container {
                flex-direction: column;
                gap: 12px;
                padding: 0 1rem;
            }
            .nav-links {
                gap: 1.2rem;
            }
            .register-card {
                padding: 1.8rem;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #03050c;
        }
        ::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 20px;
        }

        .loader-icon {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top: 2px solid #111;
            border-radius: 50%;
            animation: spinLoad 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spinLoad {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- خلفيات متطابقة مع صفحة الدخول -->
    <div class="dynamic-bg">
        <div class="gradient-sphere"></div>
        <div class="gradient-sphere second"></div>
    </div>
    <div class="particle-field" id="particleField"></div>

    <nav class="glass-nav">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-gavel"></i> CarBid</h2>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
                <a href="categories.html"><i class="fas fa-car"></i> المزادات</a>
                <a href="my-bids.html"><i class="fas fa-chart-line"></i> عروضي</a>
                <a href="wallet.html"><i class="fas fa-wallet"></i> المحفظة</a>
                <a href="register.html" class="active"><i class="fas fa-user-plus"></i> إنشاء حساب</a>
            </div>
        </div>
    </nav>

    <div class="register-wrapper">
        <div class="register-card">
            <h2>
                <i class="fas fa-user-astronaut"></i>
                انضم إلى كار بيد
            </h2>
            <form id="registerForm">
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="fullName" placeholder="الاسم الكامل" autocomplete="name" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="emailReg" placeholder="البريد الإلكتروني" autocomplete="email" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="passwordReg" placeholder="كلمة المرور" required>
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="input-field">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmPass" placeholder="تأكيد كلمة المرور" required>
                </div>
                <button type="submit" class="btn-register" id="registerBtn">
                    <i class="fas fa-rocket"></i>
                    <span>إنشاء حساب جديد</span>
                </button>
            </form>
            <div class="login-redirect">
                <i class="fas fa-sign-in-alt"></i> لديك حساب بالفعل؟
                <a href="login.html">تسجيل الدخول الآن</a>
            </div>
            <div class="terms-note">
                بالتسجيل أنت توافق على <a href="#">الشروط والأحكام</a> و <a href="#">سياسة الخصوصية</a>
            </div>
        </div>
    </div>

    <script>
        // ========== تأثير التموج ==========
        function attachRipple(btn) {
            if (!btn) return;
            btn.addEventListener('click', function(e) {
                if (btn.disabled) return;
                const rippleSpan = document.createElement('span');
                rippleSpan.classList.add('ripple-effect');
                const rect = btn.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const mouseX = e.clientX - rect.left - size/2;
                const mouseY = e.clientY - rect.top - size/2;
                rippleSpan.style.width = rippleSpan.style.height = size + 'px';
                rippleSpan.style.left = mouseX + 'px';
                rippleSpan.style.top = mouseY + 'px';
                rippleSpan.style.position = 'absolute';
                rippleSpan.style.overflow = 'hidden';
                btn.style.position = 'relative';
                btn.appendChild(rippleSpan);
                setTimeout(() => rippleSpan.remove(), 550);
            });
        }

        // Toast متطور
        function showToast(message, isError = false) {
            const oldToast = document.querySelector('.neon-toast');
            if (oldToast) oldToast.remove();
            const toast = document.createElement('div');
            toast.className = 'neon-toast';
            toast.style.borderRightColor = isError ? '#ff4d6d' : '#0ff';
            toast.style.background = isError ? 'rgba(40, 10, 20, 0.9)' : 'rgba(0, 30, 40, 0.9)';
            toast.innerHTML = `
                <i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}" style="color: ${isError ? '#ff6b8b' : '#0ff'}; font-size: 1.3rem;"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastExit 0.3s forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ========== قوة كلمة المرور ==========
        const passwordField = document.getElementById('passwordReg');
        const strengthBar = document.getElementById('strengthBar');

        function evaluateStrength(pwd) {
            let score = 0;
            if (pwd.length >= 6) score++;
            if (pwd.length >= 8) score++;
            if (/[A-Z]/.test(pwd)) score++;
            if (/[0-9]/.test(pwd)) score++;
            if (/[^A-Za-z0-9]/.test(pwd)) score++;
            return Math.min(score, 4);
        }

        function updateStrengthBar() {
            const pwd = passwordField.value;
            const strength = evaluateStrength(pwd);
            const widths = [0, 25, 50, 75, 100];
            const colors = ['#ff4d4d', '#ffaa33', '#ffff44', '#88ff88', '#0ff'];
            strengthBar.style.width = widths[strength] + '%';
            strengthBar.style.background = colors[strength];
            strengthBar.style.boxShadow = `0 0 6px ${colors[strength]}`;
        }

        if (passwordField) {
            passwordField.addEventListener('input', updateStrengthBar);
        }

        // ========== جسيمات الخلفية ==========
        function initParticleField() {
            const field = document.getElementById('particleField');
            if (!field) return;
            const particleCount = 80;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('glow-particle');
                const size = Math.random() * 4 + 1.5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = Math.random() * 14 + 7 + 's';
                particle.style.opacity = Math.random() * 0.7 + 0.2;
                particle.style.backgroundColor = Math.random() > 0.6 ? '#0ff' : '#ff44cc';
                particle.style.boxShadow = `0 0 ${Math.random() * 12 + 3}px ${Math.random() > 0.5 ? 'cyan' : 'magenta'}`;
                field.appendChild(particle);
            }
        }

        // ========== معالجة التسجيل ==========
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');

        // الحصول على مستخدمين مخزنين أو إنشاء افتراضيين (مثل صفحة اللوجين)
        function getSystemUsers() {
            let stored = localStorage.getItem('carBid_users');
            if (!stored) {
                const defaultUsers = [
                    { id: 101, name: "أحمد المزروعي", email: "ahmed@carbid.com", password: "ahmed123", walletBalance: 8750, role: "user", createdAt: new Date().toISOString() },
                    { id: 102, name: "سعاد المنصوري", email: "suaad@carbid.com", password: "suaad456", walletBalance: 15200, role: "user", createdAt: new Date().toISOString() },
                    { id: 103, name: "مدير المزادات", email: "admin@carbid.com", password: "admin2025", walletBalance: 0, role: "admin", createdAt: new Date().toISOString() }
                ];
                localStorage.setItem('carBid_users', JSON.stringify(defaultUsers));
                return defaultUsers;
            }
            return JSON.parse(stored);
        }

        function saveUsers(users) {
            localStorage.setItem('carBid_users', JSON.stringify(users));
        }

        if (registerForm) {
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const fullName = document.getElementById('fullName').value.trim();
                const email = document.getElementById('emailReg').value.trim();
                const password = document.getElementById('passwordReg').value;
                const confirm = document.getElementById('confirmPass').value;

                if (!fullName || !email || !password || !confirm) {
                    showToast("❌ جميع الحقول مطلوبة", true);
                    return;
                }

                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    showToast("❌ بريد إلكتروني غير صالح", true);
                    return;
                }

                if (password !== confirm) {
                    showToast("❌ كلمة المرور غير متطابقة", true);
                    return;
                }

                if (password.length < 6) {
                    showToast("❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل", true);
                    return;
                }

                // التحقق من عدم تكرار البريد
                const users = getSystemUsers();
                if (users.some(u => u.email === email)) {
                    showToast("⚠️ البريد الإلكتروني مسجل بالفعل، الرجاء تسجيل الدخول", true);
                    return;
                }

                // تعطيل الزر وإظهار حالة التحميل
                const originalHtml = registerBtn.innerHTML;
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<div class="loader-icon"></div><span> جاري الإنشاء...</span>';

                setTimeout(() => {
                    // إنشاء مستخدم جديد
                    const newUser = {
                        id: Date.now(),
                        name: fullName,
                        email: email,
                        password: password,
                        walletBalance: 0,
                        role: "user",
                        createdAt: new Date().toISOString()
                    };
                    users.push(newUser);
                    saveUsers(users);
                    
                    showToast(`🎉 مرحباً ${fullName}! تم إنشاء حسابك بنجاح. جاري تحويلك لتسجيل الدخول`, false);
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }, 1200);
            });
        }

        // إضافة الـ ripple على زر التسجيل
        if (registerBtn) attachRipple(registerBtn);

        // تأثير المغناطيسي ثلاثي الأبعاد للبطاقة
        const card = document.querySelector('.register-card');
        const wrapper = document.querySelector('.register-wrapper');
        if (card && wrapper) {
            wrapper.addEventListener('mousemove', (e) => {
                const rect = wrapper.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                card.style.transform = `perspective(1000px) rotateY(${x * 4}deg) rotateX(${y * -3}deg) translateY(-5px)`;
            });
            wrapper.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) translateY(0px)';
            });
        }

        // تطبيق تأثير التركيز على الحقول
        const allInputs = document.querySelectorAll('.input-field input');
        allInputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.style.transform = 'scale(1.01)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.transform = '';
            });
        });

        // تهيئة الجسيمات والخلفية
        initParticleField();

        // إضافة تحريك إضافي لأيقونة البطاقة
        const headingIcon = document.querySelector('h2 i');
        if (headingIcon) {
            setInterval(() => {
                headingIcon.style.transform = 'scale(1.05)';
                setTimeout(() => { headingIcon.style.transform = ''; }, 300);
            }, 4000);
        }
    </script>
</body>
</html>
