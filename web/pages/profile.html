<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي  </title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        
        /* ===== القائمة الجانبية الثابتة على اليمين ===== */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #1a1a2e;
            color: white;
            padding: 20px 0;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }
        
        .sidebar-header {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        .sidebar-header h2 {
            color: #e63946;
            font-size: 24px;
        }
        
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0 15px;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #ccc;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .sidebar-nav a:hover {
            background: #e63946;
            color: white;
            transform: translateX(-5px);
        }
        
        .sidebar-nav a.active {
            background: #e63946;
            color: white;
        }
        
        .sidebar-footer {
            margin-top: auto;
            padding: 20px 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #ff6b6b;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .logout-btn:hover {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
        }
        
        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 260px;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto 50px;
            padding: 20px;
        }
        
        /* إخفاء القائمة العلوية القديمة */
        .navbar {
            display: none;
        }
        
        /* tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        
        .tab-btn {
            background: none;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #666;
            border-radius: 10px;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        
        .tab-btn.active {
            background: #e63946;
            color: white;
        }
        
        .tab-btn:hover:not(.active) {
            background: #f0f2f5;
            color: #e63946;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* cards */
        .profile-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .profile-header {
            background: linear-gradient(135deg, #e63946, #c1121f);
            padding: 30px;
            text-align: center;
            color: white;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: #e63946;
            font-size: 48px;
            font-weight: bold;
            border: 4px solid white;
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .profile-role {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .profile-body {
            padding: 30px;
        }
        
        .info-row {
            display: flex;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .info-label {
            width: 140px;
            font-weight: bold;
            color: #555;
        }
        
        .info-value {
            flex: 1;
            color: #333;
        }
        
        .info-value i {
            margin-left: 8px;
            color: #e63946;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-box i {
            font-size: 30px;
            color: #e63946;
            margin-bottom: 8px;
            display: block;
        }
        
        .stat-box .number {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .stat-box .label {
            font-size: 12px;
            color: #666;
        }
        
        .edit-form {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }
        
        .edit-form.show {
            display: block;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-family: 'Cairo', sans-serif;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
        }
        
        .btn-primary {
            background: #e63946;
            color: white;
        }
        
        .btn-secondary {
            background: #2c3e50;
            color: white;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-warning {
            background: #ffc107;
            color: #333;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .msg {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .msg.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .msg.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 10px 0;
            }
            .sidebar-header h2, .sidebar-nav a span, .logout-btn span {
                display: none;
            }
            .sidebar-nav a {
                justify-content: center;
                padding: 12px;
            }
            .sidebar-nav a i {
                margin: 0;
                font-size: 20px;
            }
            .main-content {
                margin-right: 70px;
            }
            .container {
                padding: 10px;
                margin-top: 20px;
            }
            .info-row {
                flex-direction: column;
            }
            .info-label {
                width: 100%;
                margin-bottom: 5px;
            }
            .tabs {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- القائمة الجانبية الثابتة على اليمين -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-gavel"></i> CarBid</h2>
        </div>
        <div class="sidebar-nav">
            <a href="../index.html"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="auctions.html"><i class="fas fa-gavel"></i> <span>المزادات</span></a>
            <a href="search.html"><i class="fas fa-search"></i> <span>البحث</span></a>
            <a href="favorites.html"><i class="fas fa-heart"></i> <span>المفضلة</span></a>
            <a href="my-bids.html"><i class="fas fa-money-bill"></i> <span>عروضي</span></a>
            <a href="wallet.html"><i class="fas fa-wallet"></i> <span>المحفظة</span></a>
            <a href="notifications.html"><i class="fas fa-bell"></i> <span>الإشعارات</span></a>
            <a href="messages.html"><i class="fas fa-envelope"></i> <span>الرسائل</span></a>
            <a href="profile.html" class="active"><i class="fas fa-user"></i> <span>حسابي</span></a>
        </div>
        <div class="sidebar-footer">
            <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>تسجيل خروج</span></a>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="container">
            <div id="successMsg" class="msg success"></div>
            <div id="errorMsg" class="msg error"></div>

            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('profile')"><i class="fas fa-user-circle"></i> الملف الشخصي</button>
                <button class="tab-btn" onclick="showTab('edit')"><i class="fas fa-edit"></i> تعديل الملف</button>
                <button class="tab-btn" onclick="showTab('password')"><i class="fas fa-key"></i> تغيير كلمة المرور</button>
                <button class="tab-btn" onclick="showTab('stats')"><i class="fas fa-chart-line"></i> إحصائياتي</button>
            </div>

            <!-- تبويب عرض الملف الشخصي -->
            <div id="profileTab" class="tab-content active">
                <div class="profile-card">
                    <div class="profile-header">
                        <div class="profile-avatar" id="profileAvatar">A</div>
                        <div class="profile-name" id="profileName">أحمد محمد</div>
                        <div class="profile-role" id="profileRole">مستخدم</div>
                    </div>
                    <div class="profile-body">
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-envelope"></i> البريد الإلكتروني</div>
                            <div class="info-value" id="profileEmail">—</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-phone"></i> رقم الجوال</div>
                            <div class="info-value" id="profilePhone">—</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-calendar"></i> تاريخ التسجيل</div>
                            <div class="info-value" id="profileDate">—</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-tag"></i> نوع الحساب</div>
                            <div class="info-value" id="profileType">—</div>
                        </div>
                        <div class="info-row">
                            <div class="info-label"><i class="fas fa-wallet"></i> رصيد المحفظة</div>
                            <div class="info-value" id="profileBalance">—</div>
                        </div>
                        
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="showTab('edit')"><i class="fas fa-edit"></i> تعديل الملف</button>
                            <button class="btn btn-warning" onclick="showTab('password')"><i class="fas fa-key"></i> تغيير كلمة المرور</button>
                            <button class="btn btn-secondary" onclick="window.location.href='wallet.html'"><i class="fas fa-wallet"></i> شحن الرصيد</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- تبويب تعديل الملف الشخصي -->
            <div id="editTab" class="tab-content">
                <div class="profile-card">
                    <div class="profile-header">
                        <h3 style="color:white;"><i class="fas fa-edit"></i> تعديل الملف الشخصي</h3>
                    </div>
                    <div class="profile-body">
                        <form id="editForm">
                            <div class="form-group">
                                <label><i class="fas fa-user"></i> الاسم الكامل</label>
                                <input type="text" id="editName" placeholder="الاسم الكامل">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-phone"></i> رقم الجوال</label>
                                <input type="tel" id="editPhone" placeholder="رقم الجوال">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-tag"></i> نوع الحساب</label>
                                <select id="editRole" disabled>
                                    <option value="user">مستخدم عادي</option>
                                    <option value="seller">بائع</option>
                                </select>
                                <small>لا يمكن تغيير نوع الحساب بعد التسجيل</small>
                            </div>
                            <div class="btn-group">
                                <button type="button" class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> حفظ التغييرات</button>
                                <button type="button" class="btn btn-secondary" onclick="showTab('profile')"><i class="fas fa-times"></i> إلغاء</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- تبويب تغيير كلمة المرور -->
            <div id="passwordTab" class="tab-content">
                <div class="profile-card">
                    <div class="profile-header">
                        <h3 style="color:white;"><i class="fas fa-key"></i> تغيير كلمة المرور</h3>
                    </div>
                    <div class="profile-body">
                        <form id="passwordForm">
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> كلمة المرور الحالية</label>
                                <input type="password" id="currentPassword" placeholder="أدخل كلمة المرور الحالية" dir="ltr">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> كلمة المرور الجديدة</label>
                                <input type="password" id="newPassword" placeholder="أدخل كلمة المرور الجديدة" dir="ltr">
                            </div>
                            <div class="form-group">
                                <label><i class="fas fa-lock"></i> تأكيد كلمة المرور الجديدة</label>
                                <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور الجديدة" dir="ltr">
                            </div>
                            <div class="btn-group">
                                <button type="button" class="btn btn-primary" onclick="changePassword()"><i class="fas fa-save"></i> تغيير كلمة المرور</button>
                                <button type="button" class="btn btn-secondary" onclick="showTab('profile')"><i class="fas fa-times"></i> إلغاء</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- تبويب الإحصائيات الشخصية -->
            <div id="statsTab" class="tab-content">
                <div class="profile-card">
                    <div class="profile-header">
                        <h3 style="color:white;"><i class="fas fa-chart-line"></i> إحصائياتي الشخصية</h3>
                    </div>
                    <div class="profile-body">
                        <div class="stats-grid" id="personalStats"></div>
                        
                        <h4 style="margin: 20px 0 10px;"><i class="fas fa-history"></i> آخر النشاطات</h4>
                        <div id="recentActivities"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        // ========== دوال مساعدة ==========
        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('currentUser'));
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById(`${type}Msg`);
            msgDiv.textContent = msg;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        function showTab(tab) {
            document.getElementById('profileTab').classList.remove('active');
            document.getElementById('editTab').classList.remove('active');
            document.getElementById('passwordTab').classList.remove('active');
            document.getElementById('statsTab').classList.remove('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            if (tab === 'profile') {
                document.getElementById('profileTab').classList.add('active');
                document.querySelector('.tab-btn:first-child').classList.add('active');
                loadProfile();
            } else if (tab === 'edit') {
                document.getElementById('editTab').classList.add('active');
                document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
                loadEditForm();
            } else if (tab === 'password') {
                document.getElementById('passwordTab').classList.add('active');
                document.querySelector('.tab-btn:nth-child(3)').classList.add('active');
            } else if (tab === 'stats') {
                document.getElementById('statsTab').classList.add('active');
                document.querySelector('.tab-btn:nth-child(4)').classList.add('active');
                loadPersonalStats();
            }
        }

        // ========== عرض الملف الشخصي ==========
        function loadProfile() {
            currentUser = getCurrentUser();
            if (!currentUser) {
                window.location.href = '../login.html';
                return;
            }
            
            document.getElementById('profileAvatar').innerHTML = currentUser.name.charAt(0);
            document.getElementById('profileName').innerHTML = currentUser.name;
            document.getElementById('profileEmail').innerHTML = currentUser.email;
            document.getElementById('profilePhone').innerHTML = currentUser.phone || '—';
            document.getElementById('profileDate').innerHTML = currentUser.createdAt ? new Date(currentUser.createdAt).toLocaleDateString('ar') : '—';
            
            let roleText = '';
            if (currentUser.role === 'admin') roleText = '👑 مدير النظام';
            else if (currentUser.role === 'seller') roleText = '🏷️ بائع';
            else roleText = '👤 مستخدم عادي';
            document.getElementById('profileType').innerHTML = roleText;
            
            document.getElementById('profileBalance').innerHTML = `${(currentUser.balance || 0).toLocaleString()} ر.س <a href="wallet.html" style="color:#e63946; font-size:12px;">(شحن)</a>`;
        }

        // ========== تحميل نموذج التعديل ==========
        function loadEditForm() {
            currentUser = getCurrentUser();
            if (!currentUser) return;
            
            document.getElementById('editName').value = currentUser.name || '';
            document.getElementById('editPhone').value = currentUser.phone || '';
            document.getElementById('editRole').value = currentUser.role || 'user';
        }

        // ========== حفظ التعديلات ==========
        function saveProfile() {
            const newName = document.getElementById('editName').value;
            const newPhone = document.getElementById('editPhone').value;
            
            if (!newName) {
                showMessage('الاسم مطلوب', 'error');
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            
            if (userIndex !== -1) {
                users[userIndex].name = newName;
                users[userIndex].phone = newPhone;
                localStorage.setItem('users', JSON.stringify(users));
                
                currentUser.name = newName;
                currentUser.phone = newPhone;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                showMessage('✅ تم تحديث الملف الشخصي بنجاح', 'success');
                showTab('profile');
            }
        }

        // ========== تغيير كلمة المرور ==========
        function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!currentPassword || !newPassword || !confirmPassword) {
                showMessage('يرجى تعبئة جميع الحقول', 'error');
                return;
            }
            
            if (currentPassword !== currentUser.password) {
                showMessage('كلمة المرور الحالية غير صحيحة', 'error');
                return;
            }
            
            if (newPassword.length < 4) {
                showMessage('كلمة المرور الجديدة يجب أن تكون 4 أحرف على الأقل', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('كلمة المرور الجديدة غير متطابقة', 'error');
                return;
            }
            
            // تحديث كلمة المرور
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            
            if (userIndex !== -1) {
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));
                
                currentUser.password = newPassword;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                showMessage('✅ تم تغيير كلمة المرور بنجاح', 'success');
                
                // تفريغ الحقول
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                
                showTab('profile');
            }
        }

        // ========== الإحصائيات الشخصية ==========
        function loadPersonalStats() {
            currentUser = getCurrentUser();
            if (!currentUser) return;
            
            const cars = JSON.parse(localStorage.getItem('cars')) || [];
            const bids = JSON.parse(localStorage.getItem('bids')) || [];
            const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            
            // إحصائيات المستخدم
            const myCars = cars.filter(c => c.sellerId === currentUser.id);
            const myActiveAuctions = myCars.filter(c => c.status === 'active').length;
            const mySoldCars = myCars.filter(c => c.status === 'sold').length;
            const myBids = bids.filter(b => b.userId === currentUser.id);
            const myWonAuctions = cars.filter(c => c.winnerId === currentUser.id).length;
            
            const totalDeposit = transactions.filter(t => t.userId === currentUser.id && t.type === 'deposit').reduce((sum, t) => sum + t.amount, 0);
            const totalSpent = transactions.filter(t => t.userId === currentUser.id && (t.type === 'bid' || t.type === 'withdraw')).reduce((sum, t) => sum + t.amount, 0);
            
            document.getElementById('personalStats').innerHTML = `
                <div class="stat-box"><i class="fas fa-car"></i><div class="number">${myCars.length}</div><div class="label">سياراتي</div></div>
                <div class="stat-box"><i class="fas fa-fire"></i><div class="number">${myActiveAuctions}</div><div class="label">مزادات نشطة</div></div>
                <div class="stat-box"><i class="fas fa-check-circle"></i><div class="number">${mySoldCars}</div><div class="label">سيارات مباعة</div></div>
                <div class="stat-box"><i class="fas fa-gavel"></i><div class="number">${myBids.length}</div><div class="label">عروض قدمتها</div></div>
                <div class="stat-box"><i class="fas fa-trophy"></i><div class="number">${myWonAuctions}</div><div class="label">مزادات فزت بها</div></div>
                <div class="stat-box"><i class="fas fa-chart-line"></i><div class="number">${(totalDeposit - totalSpent).toLocaleString()} ر.س</div><div class="label">صافي الربح</div></div>
            `;
            
            // آخر النشاطات
            const userTransactions = transactions.filter(t => t.userId === currentUser.id).slice(0, 5);
            const userBids = myBids.slice(0, 5);
            
            let activitiesHtml = '';
            
            if (userTransactions.length > 0) {
                activitiesHtml += userTransactions.map(t => `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                        <div><i class="fas ${t.type === 'deposit' ? 'fa-plus-circle' : 'fa-minus-circle'}"></i> ${t.description}</div>
                        <div style="color:${t.type === 'deposit' ? '#28a745' : '#dc3545'}">${t.type === 'deposit' ? '+' : '-'} ${t.amount.toLocaleString()} ر.س</div>
                    </div>
                `).join('');
            }
            
            if (userBids.length > 0) {
                activitiesHtml += userBids.map(b => {
                    const car = cars.find(c => c.id === b.carId);
                    return `
                        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                            <div><i class="fas fa-gavel"></i> عرض على ${car?.brand || ''} ${car?.model || ''}</div>
                            <div>${b.amount.toLocaleString()} ر.س</div>
                        </div>
                    `;
                }).join('');
            }
            
            if (activitiesHtml === '') {
                activitiesHtml = '<div style="text-align:center; padding:20px; color:#999;">لا توجد نشاطات بعد</div>';
            }
            
            document.getElementById('recentActivities').innerHTML = activitiesHtml;
        }

        // ========== تسجيل خروج ==========
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }

        // ========== تحميل أولي ==========
        function init() {
            currentUser = getCurrentUser();
            if (!currentUser) {
                window.location.href = '../login.html';
                return;
            }
            loadProfile();
        }
        
        init();
    </script>
</body>
</html>
