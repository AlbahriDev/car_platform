<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المحفظة - CarBid | شحن الرصيد وسجل العمليات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; }
        
        /* ===== القائمة الجانبية الثابتة على اليمين ===== */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 260px;
            height: 100%;
            background: #1a1a2e;
            color: white;
            padding: 20px 0;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }
        
        .sidebar-header {
            text-align: center;
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        
        .sidebar-header h2 {
            color: #e63946;
            font-size: 24px;
        }
        
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 0 15px;
        }
        
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #ccc;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .sidebar-nav a:hover {
            background: #e63946;
            color: white;
            transform: translateX(-5px);
        }
        
        .sidebar-nav a.active {
            background: #e63946;
            color: white;
        }
        
        .sidebar-footer {
            margin-top: auto;
            padding: 20px 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
        }
        
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #ff6b6b;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .logout-btn:hover {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
        }
        
        /* المحتوى الرئيسي */
        .main-content {
            margin-right: 260px;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 30px auto 50px;
            padding: 20px;
        }
        
        /* إخفاء القائمة العلوية القديمة */
        .navbar {
            display: none;
        }
        
        /* بطاقة الرصيد */
        .balance-card {
            background: linear-gradient(135deg, #e63946, #c1121f);
            color: white;
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .balance-card h3 {
            font-size: 20px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .balance-card .amount {
            font-size: 56px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .balance-card small {
            display: block;
            margin-top: 10px;
            opacity: 0.7;
        }
        
        /* البطاقات */
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
        
        .card h3 {
            color: #e63946;
            margin-bottom: 20px;
            border-right: 4px solid #e63946;
            padding-right: 15px;
        }
        
        /* أزرار المبالغ */
        .amount-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .amount-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 14px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .amount-btn:hover {
            border-color: #e63946;
            background: #fff5f5;
            color: #e63946;
            transform: translateY(-2px);
        }
        
        .amount-btn.active {
            border-color: #e63946;
            background: #e63946;
            color: white;
        }
        
        /* حقل مخصص */
        .custom-amount {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .custom-amount input {
            flex: 1;
            padding: 14px;
            border: 2px solid #e9ecef;
            border-radius: 50px;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        
        .custom-amount input:focus {
            outline: none;
            border-color: #e63946;
        }
        
        .custom-amount button {
            background: #e63946;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .custom-amount button:hover {
            background: #c1121f;
            transform: scale(1.02);
        }
        
        /* سجل العمليات */
        .transaction-list {
            max-height: 450px;
            overflow-y: auto;
        }
        
        .transaction-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.3s;
        }
        
        .transaction-item:hover {
            background: #f8f9fa;
        }
        
        .transaction-icon {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-left: 15px;
        }
        
        .transaction-icon.deposit {
            background: #d4edda;
            color: #28a745;
        }
        
        .transaction-icon.withdraw {
            background: #f8d7da;
            color: #dc3545;
        }
        
        .transaction-icon.bid {
            background: #fff3cd;
            color: #ffc107;
        }
        
        .transaction-details {
            flex: 1;
        }
        
        .transaction-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .transaction-date {
            font-size: 12px;
            color: #999;
        }
        
        .transaction-amount {
            font-weight: bold;
            font-size: 18px;
        }
        
        .transaction-amount.deposit {
            color: #28a745;
        }
        
        .transaction-amount.withdraw {
            color: #dc3545;
        }
        
        .transaction-amount.bid {
            color: #e63946;
        }
        
        .empty-msg {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        /* رسائل */
        .msg {
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
        
        .msg.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .msg.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        /* ملخص الحساب */
        #summaryContent {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }
        
        #summaryContent div div:first-child {
            font-size: 24px;
            font-weight: bold;
        }
        
        #summaryContent div div:last-child {
            color: #666;
            font-size: 14px;
        }
        
        /* استجابة للأجهزة الصغيرة */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 10px 0;
            }
            .sidebar-header h2, .sidebar-nav a span, .logout-btn span {
                display: none;
            }
            .sidebar-nav a {
                justify-content: center;
                padding: 12px;
            }
            .sidebar-nav a i {
                margin: 0;
                font-size: 20px;
            }
            .main-content {
                margin-right: 70px;
            }
            .container {
                padding: 10px;
                margin-top: 20px;
            }
            .balance-card .amount {
                font-size: 36px;
            }
            .amount-btn {
                padding: 10px 18px;
                font-size: 14px;
            }
            #summaryContent {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- القائمة الجانبية الثابتة على اليمين -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-gavel"></i> CarBid</h2>
        </div>
        <div class="sidebar-nav">
            <a href="../index.html"><i class="fas fa-home"></i> <span>الرئيسية</span></a>
            <a href="auctions.html"><i class="fas fa-gavel"></i> <span>المزادات</span></a>
            <a href="search.html"><i class="fas fa-search"></i> <span>البحث</span></a>
            <a href="favorites.html"><i class="fas fa-heart"></i> <span>المفضلة</span></a>
            <a href="my-bids.html"><i class="fas fa-money-bill"></i> <span>عروضي</span></a>
            <a href="wallet.html" class="active"><i class="fas fa-wallet"></i> <span>المحفظة</span></a>
            <a href="notifications.html"><i class="fas fa-bell"></i> <span>الإشعارات</span></a>
            <a href="messages.html"><i class="fas fa-envelope"></i> <span>الرسائل</span></a>
            <a href="profile.html"><i class="fas fa-user"></i> <span>حسابي</span></a>
        </div>
        <div class="sidebar-footer">
            <a href="#" onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> <span>تسجيل خروج</span></a>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content">
        <div class="container">
            <div id="successMsg" class="msg success"></div>
            <div id="errorMsg" class="msg error"></div>

            <!-- بطاقة الرصيد -->
            <div class="balance-card">
                <h3><i class="fas fa-wallet"></i> رصيد المحفظة</h3>
                <div class="amount" id="balanceAmount">0 ر.س</div>
                <small>الرصيد المتاح للمزايدة</small>
            </div>

            <!-- قسم الشحن -->
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> شحن الرصيد</h3>
                <div class="amount-buttons">
                    <div class="amount-btn" data-amount="100">100 ر.س</div>
                    <div class="amount-btn" data-amount="500">500 ر.س</div>
                    <div class="amount-btn" data-amount="1000">1,000 ر.س</div>
                    <div class="amount-btn" data-amount="5000">5,000 ر.س</div>
                    <div class="amount-btn" data-amount="10000">10,000 ر.س</div>
                    <div class="amount-btn" data-amount="50000">50,000 ر.س</div>
                </div>
                <div class="custom-amount">
                    <input type="number" id="customAmount" placeholder="أدخل مبلغ مخصص (ريال)">
                    <button onclick="depositWithCustom()"><i class="fas fa-arrow-left"></i> شحن</button>
                </div>
            </div>

            <!-- سجل العمليات -->
            <div class="card">
                <h3><i class="fas fa-history"></i> سجل العمليات المالية</h3>
                <div id="transactionsList" class="transaction-list"></div>
            </div>

            <!-- ملخص -->
            <div class="card" id="summaryCard" style="display:none;">
                <h3><i class="fas fa-chart-line"></i> ملخص الحساب</h3>
                <div id="summaryContent"></div>
            </div>
        </div>
    </div>

    <script>
        let selectedAmount = null;

        // ========== دوال مساعدة ==========
        function getCurrentUser() {
            return JSON.parse(localStorage.getItem('currentUser'));
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById(`${type}Msg`);
            msgDiv.textContent = msg;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        // ========== تحديث عرض الرصيد ==========
        function updateBalanceDisplay() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('balanceAmount').innerHTML = `${(user.balance || 0).toLocaleString()} ر.س`;
            }
        }

        // ========== اختيار مبلغ ==========
        function selectAmount(amount) {
            selectedAmount = amount;
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // ربط الأزرار
        document.querySelectorAll('.amount-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const amount = parseInt(this.getAttribute('data-amount'));
                selectedAmount = amount;
                document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // ========== شحن الرصيد ==========
        function depositWithCustom() {
            const customAmount = parseInt(document.getElementById('customAmount').value);
            const amount = selectedAmount || customAmount;
            
            if (!amount || amount <= 0) {
                showMessage('يرجى اختيار أو إدخال مبلغ صحيح', 'error');
                return;
            }
            
            deposit(amount);
        }
        
        function deposit(amount) {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                window.location.href = '../login.html';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('users'));
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            
            if (userIndex !== -1) {
                users[userIndex].balance = (users[userIndex].balance || 0) + amount;
                localStorage.setItem('users', JSON.stringify(users));
                
                const updatedUser = users[userIndex];
                localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                
                // تسجيل العملية
                const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                transactions.unshift({
                    id: Date.now(),
                    userId: currentUser.id,
                    type: 'deposit',
                    amount: amount,
                    description: `💰 شحن رصيد بمبلغ ${amount.toLocaleString()} ر.س`,
                    date: new Date().toISOString()
                });
                localStorage.setItem('transactions', JSON.stringify(transactions));
                
                updateBalanceDisplay();
                loadTransactions();
                showMessage(`✅ تم شحن ${amount.toLocaleString()} ر.س بنجاح!`, 'success');
                
                // إعادة تعيين
                selectedAmount = null;
                document.getElementById('customAmount').value = '';
                document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));
            }
        }

        // ========== خصم الرصيد (تستخدم عند المزايدة) ==========
        function deductBalance(userId, amount, description) {
            let users = JSON.parse(localStorage.getItem('users'));
            const userIndex = users.findIndex(u => u.id === userId);
            
            if (userIndex === -1) return false;
            if ((users[userIndex].balance || 0) < amount) return false;
            
            users[userIndex].balance = (users[userIndex].balance || 0) - amount;
            localStorage.setItem('users', JSON.stringify(users));
            
            // تحديث المستخدم الحالي إذا كان هو نفسه
            const currentUser = getCurrentUser();
            if (currentUser && currentUser.id === userId) {
                localStorage.setItem('currentUser', JSON.stringify(users[userIndex]));
                updateBalanceDisplay();
            }
            
            // تسجيل العملية
            const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            transactions.unshift({
                id: Date.now(),
                userId: userId,
                type: 'withdraw',
                amount: amount,
                description: description,
                date: new Date().toISOString()
            });
            localStorage.setItem('transactions', JSON.stringify(transactions));
            
            loadTransactions();
            return true;
        }

        // ========== سجل العمليات ==========
        function loadTransactions() {
            const currentUser = getCurrentUser();
            if (!currentUser) return;
            
            const transactions = JSON.parse(localStorage.getItem('transactions')) || [];
            const myTransactions = transactions.filter(t => t.userId === currentUser.id);
            
            const container = document.getElementById('transactionsList');
            
            if (myTransactions.length === 0) {
                container.innerHTML = '<div class="empty-msg"><i class="fas fa-receipt" style="font-size: 40px; color: #ccc;"></i><p style="margin-top: 10px;">لا توجد عمليات مالية مسجلة</p></div>';
                return;
            }
            
            container.innerHTML = myTransactions.map(t => {
                let iconClass = '';
                let amountClass = '';
                let amountSymbol = '';
                
                if (t.type === 'deposit') {
                    iconClass = 'deposit';
                    amountClass = 'deposit';
                    amountSymbol = '+';
                } else if (t.type === 'bid') {
                    iconClass = 'bid';
                    amountClass = 'bid';
                    amountSymbol = '-';
                } else {
                    iconClass = 'withdraw';
                    amountClass = 'withdraw';
                    amountSymbol = '-';
                }
                
                return `
                    <div class="transaction-item">
                        <div class="transaction-icon ${iconClass}">
                            <i class="fas ${t.type === 'deposit' ? 'fa-plus' : (t.type === 'bid' ? 'fa-gavel' : 'fa-minus')}"></i>
                        </div>
                        <div class="transaction-details">
                            <div class="transaction-title">${t.description}</div>
                            <div class="transaction-date">${new Date(t.date).toLocaleDateString('ar')} - ${new Date(t.date).toLocaleTimeString('ar')}</div>
                        </div>
                        <div class="transaction-amount ${amountClass}">
                            ${amountSymbol} ${t.amount.toLocaleString()} ر.س
                        </div>
                    </div>
                `;
            }).join('');
            
            // حساب الملخص
            const totalDeposit = myTransactions.filter(t => t.type === 'deposit').reduce((sum, t) => sum + t.amount, 0);
            const totalWithdraw = myTransactions.filter(t => t.type === 'withdraw' || t.type === 'bid').reduce((sum, t) => sum + t.amount, 0);
            const currentBalance = (currentUser.balance || 0);
            
            document.getElementById('summaryCard').style.display = 'block';
            document.getElementById('summaryContent').innerHTML = `
                <div style="color: #28a745; font-size: 24px; font-weight: bold;">${totalDeposit.toLocaleString()} ر.س</div>
                <div style="color: #666; font-size: 14px;">إجمالي الإيداعات</div>
                <div style="color: #dc3545; font-size: 24px; font-weight: bold;">${totalWithdraw.toLocaleString()} ر.س</div>
                <div style="color: #666; font-size: 14px;">إجمالي المدفوعات</div>
                <div style="color: #e63946; font-size: 24px; font-weight: bold;">${currentBalance.toLocaleString()} ر.س</div>
                <div style="color: #666; font-size: 14px;">الرصيد الحالي</div>
            `;
        }

        // ========== تسجيل خروج ==========
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '../login.html';
        }

        // ========== تحميل أولي ==========
        function init() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = '../login.html';
                return;
            }
            updateBalanceDisplay();
            loadTransactions();
        }

        init();

        // جعل الدوال عامة للاستخدام من صفحات أخرى
        window.deductBalance = deductBalance;
    </script>
</body>
</html>
